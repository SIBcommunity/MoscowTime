<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Московские часы</title>
</head>

<body translate="no">
  <div id="output"
       style="display: inline-block;
              font-family: monospace;
              font-size: 30px;
              text-align: right;
              color: lightgray;
              border-radius: 10px;
              padding: 10px;
              background-color: rgba(0, 0, 0, 0.75);">
  </div>

  <!-- Moment.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>

  <!-- Moment Timezone -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.5.43/moment-timezone-with-data.min.js"></script>

  <script>
    // Получение параметров URL
    var urlParams;
    (function () {
      var match,
          pl = /\+/g,
          search = /([^&=]+)=?([^&]*)/g,
          decode = function (s) {
            return decodeURIComponent(s.replace(pl, " "));
          },
          query = window.location.search.substring(1);

      urlParams = {};

      while (match = search.exec(query)) {
        urlParams[decode(match[1])] = decode(match[2]);
      }
    })();

    var output = document.getElementById("output");

    if (urlParams["style"]) {
      output.setAttribute("style", urlParams["style"]);
    }

    if (urlParams["bodyStyle"]) {
      document.body.setAttribute("style", urlParams["bodyStyle"]);
    }

    function updateClock() {
      output.innerText = moment()
        .tz("Europe/Moscow")
        .format(urlParams["format"] || "DD/MM/YYYY HH:mm:ss");
    }

    setInterval(updateClock, 1000);
    updateClock();
  </script>
</body>

</html>
